# Production compose file - uses pre-built images from GitHub Container Registry
# Usage: docker-compose -f docker-compose.prod.yaml up -d

services:
  backend:
    image: ${IMAGE_REGISTRY:-ghcr.io/Parthasarathy-G}/backend:${IMAGE_TAG:-latest}
    container_name: backend-container-build
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      PORT: 5000
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1d}
      RISK_PREDICTOR_URL: ${RISK_PREDICTOR_URL:-http://host.docker.internal:8000/api/patient/add}
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      - backend_uploads:/app/uploads

  frontend:
    image: ${IMAGE_REGISTRY:-ghcr.io/Parthasarathy-G}/frontend:${IMAGE_TAG:-latest}
    container_name: frontend-container-build
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:3000"
    depends_on:
      - backend
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp

volumes:
  backend_uploads:
