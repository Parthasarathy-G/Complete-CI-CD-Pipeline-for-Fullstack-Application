name: Security check
on:
    push:
        branches:
            - master
            - development
    pull_request:
        branches:
            - master
            - development
permissions:
    contents: read

jobs:
    security-check:
        runs-on: ubuntu-latest
        permissions:
            contents: read
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Build Docker image
              run: docker build -t fullstack-app-pipeline:${{ github.sha }} .

            - name: Run Trivy filesystem scan
              uses: aquasecurity/trivy-action@master
              with:
                scan-type: fs
                scan-ref: .
                scanners: vuln,misconfig,secret
                severity: HIGH,CRITICAL
                ignore-unfixed: true
                exit-code: 1
                format: table

            - name: Run Trivy image scan
              uses: aquasecurity/trivy-action@master
              with:
                image-ref: fullstack-app-pipeline:${{ github.sha }}
                scanners: vuln,misconfig,secret
                severity: HIGH,CRITICAL
                ignore-unfixed: true
                exit-code: 1
                format: table

            - name: Generate SBOM
              uses: aquasecurity/trivy-action@master
              with:
                image-ref: fullstack-app-pipeline:${{ github.sha }}
                format: cyclonedx
                output: trivy-image-sbom.json

            - name: Upload SBOM artifact
              uses: actions/upload-artifact@v4
              with:
                name: trivy-image-sbom
                path: trivy-image-sbom.json


