name: Sync Development To Master

on:
    schedule:
        - cron: "15 6 * * *"
    workflow_dispatch:

permissions:
    contents: read
    pull-requests: write

jobs:
    open-sync-pr:
        runs-on: ubuntu-latest

        steps:
            - name: Create or reuse sync pull request
              uses: actions/github-script@v7
              with:
                github-token: ${{ secrets.GITHUB_TOKEN }}
                script: |
                  const owner = context.repo.owner;
                  const repo = context.repo.repo;
                  const base = "master";
                  const headBranch = "development";
                  const head = `${owner}:${headBranch}`;

                  const comparison = await github.rest.repos.compareCommitsWithBasehead({
                    owner,
                    repo,
                    basehead: `${base}...${headBranch}`,
                  });

                  if (comparison.data.ahead_by === 0) {
                    core.info("Development is already in sync with master. No PR created.");
                    return;
                  }

                  const existing = await github.rest.pulls.list({
                    owner,
                    repo,
                    state: "open",
                    base,
                    head,
                    per_page: 1,
                  });

                  if (existing.data.length > 0) {
                    core.info(`Open sync PR already exists: #${existing.data[0].number}`);
                    return;
                  }

                  const pullRequest = await github.rest.pulls.create({
                    owner,
                    repo,
                    title: "chore(sync): merge development into master",
                    head: headBranch,
                    base,
                    body: [
                      "Automated daily sync PR from `development` to `master`.",
                      "",
                      "Schedule: 11:00 AM IST every day.",
                    ].join("\n"),
                  });

                  core.info(`Created sync PR #${pullRequest.data.number}`);
