name: Pipeline check

on:
    push:
        branches:
            - master
            - development
    pull_request:
        branches:
            - master
            - development

permissions:
    contents: read
    
jobs:
    basic-check:
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: frontend

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup node js
              uses: actions/setup-node@v4
              with:
                node-version: 18
                cache: npm
                cache-dependency-path: frontend/package-lock.json
            
            - name: Install dependencies
              run: npm ci

            - name: Lint the code
              run: npm run lint
            
            - name: Building the app
              run: npm run build

    security-check:
        runs-on: ubuntu-latest
        needs: basic-check
        permissions:
            contents: read
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Build Docker image
              run: docker build -t Fullstack-app-pipeline:${{ github.sha }} .

            - name: Run Trivy filesystem scan
              uses: aquasecurity/trivy-action@master
              with:
                scan-type: fs
                scan-ref: .
                scanners: vuln,misconfig,secret
                severity: HIGH,CRITICAL
                ignore-unfixed: true
                exit-code: 1
                format: table

            - name: Run Trivy image scan
              uses: aquasecurity/trivy-action@master
              with:
                image-ref: fullstack-frontend:${{ github.sha }}
                scanners: vuln,misconfig,secret
                severity: HIGH,CRITICAL
                ignore-unfixed: true
                exit-code: 1
                format: table

            - name: Generate SBOM
              uses: aquasecurity/trivy-action@0.33.1
              with:
                image-ref: fullstack-frontend:${{ github.sha }}
                format: cyclonedx
                output: trivy-image-sbom.json

            - name: Upload SBOM artifact
              uses: actions/upload-artifact@v4
              with:
                name: trivy-image-sbom
                path: trivy-image-sbom.json
