name: Pipeline check

on:
    push:
        branches:
            - master
            - development
    pull_request:
        branches:
            - master
            - development

permissions:
    contents: read
    
jobs:
    basic-check:
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: frontend

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup node js
              uses: actions/setup-node@v4
              with:
                node-version: 18
                cache: npm
                cache-dependency-path: frontend/package-lock.json
            
            - name: Install dependencies
              run: npm ci

            - name: Lint the code
              run: npm run lint
            
            - name: Building the app
              run: npm run build
